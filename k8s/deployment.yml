apiVersion: apps/v1
kind: Deployment
metadata:
  name: githubemc1-deployment
  namespace: default
  labels:
    app: githubemc1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: githubemc1
  template:
    metadata:
      labels:
        app: githubemc1
    spec:
  containers:
    - name: githubemc1-app
      image: <your-dockerhub-username>/githubemc1:latest
      ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: githubemc1-service
  namespace: default
spec:
  type: NodePort
  selector:
    app: githubemc1
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080