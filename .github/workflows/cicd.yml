name: Java CI Pipeline with SonarCloud and Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4       # Upgraded minor patch handles Node 24
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4     # V4/V5 releases natively migrated to Node 24
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: mvn clean package

    # Ensures your code is scanned before building the final image
    - name: Run SonarCloud Static Code Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn sonar:sonar \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.organization=kguruprasad01 \
          -Dsonar.projectKey=KGuruPrasad01_githubemc1

    # Log in to your free Docker Hub registry using production stable actions
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build the image based on the Dockerfile and push it up
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        # Using your explicit Docker Hub username string directly in the tag format
        tags: guru2014/githubemc1-app:latest