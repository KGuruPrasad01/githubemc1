name: Java CI Pipeline with SonarCloud and Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Bumping to checkout@v4.2.2 or higher forces the latest sub-build targeting Node 24
    - name: Checkout Source Code
      uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 0

    # Bumping setup-java to v4.5.0+ or v5 ensures native Node 24 compilation
    - name: Set up JDK 17
      uses: actions/setup-java@v4.5.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: mvn clean package

    - name: Run SonarCloud Static Code Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn sonar:sonar \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.organization=kguruprasad01 \
          -Dsonar.projectKey=KGuruPrasad01_githubemc1

    # Pin to the stable production version (v3 is the current official major for Node 24 compatibility)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3.3.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Pin to the stable production version (v6 is the current official major)
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6.13.0
      with:
        context: .
        push: true
        tags: guru2014/githubemc1-app:latest